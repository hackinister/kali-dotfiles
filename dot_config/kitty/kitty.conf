# vim:fileencoding=utf-8:foldmethod=marker

# ============================================================================
# FONT CONFIGURATION
# ============================================================================
# Best Practice: Explizite Angabe der Nerd Font Features
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 18.0
disable_ligatures never
font_family      family="Iosevka Nerd Font"
adjust_line_height 125%

# ============================================================================
# WAYLAND & PERFORMANCE
# ============================================================================
# Erzwingt Wayland (verhindert XWayland-Blurriness)
linux_display_server auto

# Synchronisation für flüssiges Scrollen auf High-Refresh-Monitoren
sync_to_monitor yes

# Standardwerte sind meist performanter als aggressive Delays
# repaint_delay 10  <-- Deaktiviert (Default ~10ms ist gut)
# input_delay 3     <-- Deaktiviert (Default ist bereits minimal)

# Hintergrund-Rendering für Transparenz
background_opacity 0.95
# Hinweis: background_blur funktioniert unter Wayland nur, wenn der Compositor
# (z.B. KDE) das Protokoll unterstützt. Bei Hyprland/Sway besser via Window-Rules regeln.
background_blur 1

# ============================================================================
# CURSOR & MOUSE
# ============================================================================
cursor_shape block
cursor_blink_interval 0.5 ease-in-out
cursor_stop_blinking_after 15.0

# Experimentelles Feature: Cursor Trail (Optik)
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# URLs
url_style curly
detect_urls yes
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
allow_hyperlinks yes

# Maus-Interaktion
mouse_hide_wait 3.0

# Klicken auf URLs oder Auswählen
mouse_map left click ungrabbed mouse_click_url_or_select

# Doppelklick = Wort auswählen / Dreifachklick = Zeile auswählen
mouse_map left doublepress ungrabbed mouse_selection word
mouse_map left triplepress ungrabbed mouse_selection line

# Mittelklick = Einfügen aus Auswahl
mouse_map middle press ungrabbed paste_from_selection

# Rechtsklick = Command Output auswählen (Power-Feature!)
mouse_map right press ungrabbed mouse_select_command_output

# ============================================================================
# WINDOW LAYOUT & DECORATIONS
# ============================================================================
remember_window_size no
initial_window_width 1920
initial_window_height 720
startup_mode windowed

# Ränder und Padding
window_padding_width 2
window_margin_width 5
single_window_margin_width 0
hide_window_decorations yes

# Rahmenfarben
active_border_color #00ff00
inactive_border_color #282828
window_border_width 1pt
draw_minimal_borders yes
inactive_text_alpha 0.7

# Logo Overlay (Absoluter Pfad empfohlen!)
window_logo_path ~/.config/kitty/logo-text-128.png
window_logo_position top-right
window_logo_alpha 0.1
window_logo_scale 10

# Layouts
enabled_layouts grid, stack


# ============================================================================
# TAB BAR (Powerline Style)
# ============================================================================
tab_bar_edge bottom
tab_bar_margin_width 1.0
tab_bar_margin_height 1.0 0.5
tab_bar_style powerline
tab_powerline_style angled
tab_activity_symbol ⚡
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_title_template "{index}: {title}"

# Fading und Fonts
tab_fade 0.25 0.5 0.75 1
active_tab_font_style   bold-italic
inactive_tab_font_style normal

# ============================================================================
# BELL
# ============================================================================
enable_audio_bell no
visual_bell_duration 0.1

# ============================================================================
# ADVANCED INTEGRATIONS
# ============================================================================
allow_remote_control yes
# Verwendung von UNIX Sockets mit PID verhindert Konflikte bei mehreren Instanzen
listen_on unix:/tmp/kitty

# Shell Integration aktivieren (wichtig für Cursor-Positionierung und SSH)
shell_integration enabled

# Scrollback Buffer
scrollback_lines 10000
# Pager für nvim integration


# ============================================================================
# KEYBINDINGS
# ============================================================================
kitty_mod ctrl+shift

# Config Reload
map kitty_mod+r load_config_file

# Window Management 
map kitty_mod+left neighboring_window left
map kitty_mod+right neighboring_window right
map kitty_mod+up neighboring_window up
map kitty_mod+down neighboring_window down

# Layout Manipulation
map kitty_mod+enter next_layout
map kitty_mod+f toggle_fullscreen

# Neue Fenster / Splits
map kitty_mod+o launch --location=vsplit --cwd=current
map kitty_mod+e launch --location=hsplit --cwd=current
map kitty_mod+n new_os_window

# Copy to buffer
map ctrl+shift+alt+c copy_to_buffer a
map ctrl+shift+alt+v paste_from_buffer a

map kitty_mod+u open_url_with_hints

map kitty_mod+s search_scrollback

# Synchronize Panes
map kitty_mod+l launch kitty +kitten broadcast

# INCLUDING CONFIG FILES
include open-actions.conf 

# ============================================================================
# KITTY-SCROLLBACK.NVIM
# ============================================================================

# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten $HOME/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Scrollback in nvim öffnen
map kitty_mod+h kitty_scrollback_nvim

# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output

# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output

# Clear screen and scrollback
map kitty_mod+delete clear_terminal reset active

# BEGIN_KITTY_THEME
# Adapta Nokto Maia
include current-theme.conf
# END_KITTY_THEME


